<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1260 540" width="100%" height="auto" preserveAspectRatio="xMidYMid meet" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="13">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#fff"/>
    </marker>
  </defs>

  <g fill="none" stroke="#fff" stroke-width="1.25" stroke-linecap="round" stroke-linejoin="round">
    <!-- ===== Top-level signal flow ===== -->

    <!-- Boxes -->
    <rect x="20"   y="140" width="78"  height="32" rx="4"/>           <!-- source -->
    <rect x="190"  y="60"  width="220" height="32" rx="4"/>           <!-- dryDelay -->
    <rect x="440"  y="60"  width="140" height="32" rx="4"/>           <!-- masterDryGain -->
    <rect x="160"  y="260" width="80"  height="32" rx="4"/>           <!-- toMono -->
    <rect x="270"  y="260" width="100" height="32" rx="4"/>           <!-- inputGain -->
    <rect x="430"  y="220" width="100" height="32" rx="4"/>           <!-- Funk [net] -->
    <rect x="430"  y="300" width="110" height="32" rx="4"/>           <!-- Djembe [net] -->
    <rect x="600"  y="260" width="64"  height="32" rx="4"/>           <!-- fade -->
    <rect x="694"  y="260" width="140" height="32" rx="4"/>           <!-- comp(dry/wet) -->
    <rect x="864"  y="260" width="110" height="32" rx="4"/>           <!-- outputGain -->
    <rect x="1004" y="260" width="140" height="32" rx="4"/>           <!-- masterWetGain -->
    <rect x="1180" y="140" width="60"  height="32" rx="4"/>           <!-- dest -->

    <!-- source -> tee -->
    <line x1="98"  y1="156" x2="130" y2="156" marker-end="url(#arrow)"/>
    <line x1="130" y1="76"  x2="130" y2="276"/>

    <!-- top branch -->
    <line x1="130" y1="76"  x2="190" y2="76" marker-end="url(#arrow)"/>
    <line x1="410" y1="76"  x2="440" y2="76" marker-end="url(#arrow)"/>
    <line x1="580" y1="76"  x2="1170" y2="76"/>
    <line x1="1170" y1="76" x2="1170" y2="156"/>

    <!-- bottom branch -->
    <line x1="130" y1="276" x2="160" y2="276" marker-end="url(#arrow)"/>
    <line x1="240" y1="276" x2="270" y2="276" marker-end="url(#arrow)"/>
    <line x1="370" y1="276" x2="400" y2="276" marker-end="url(#arrow)"/>
    <line x1="400" y1="236" x2="400" y2="316"/>
    <line x1="400" y1="236" x2="430" y2="236" marker-end="url(#arrow)"/>
    <line x1="400" y1="316" x2="430" y2="316" marker-end="url(#arrow)"/>
    <line x1="530" y1="236" x2="560" y2="236"/>
    <line x1="540" y1="316" x2="560" y2="316"/>
    <line x1="560" y1="236" x2="560" y2="316"/>
    <line x1="560" y1="276" x2="600" y2="276" marker-end="url(#arrow)"/>
    <line x1="664" y1="276" x2="694" y2="276" marker-end="url(#arrow)"/>
    <line x1="834" y1="276" x2="864" y2="276" marker-end="url(#arrow)"/>
    <line x1="974" y1="276" x2="1004" y2="276" marker-end="url(#arrow)"/>
    <line x1="1144" y1="276" x2="1170" y2="276"/>
    <line x1="1170" y1="276" x2="1170" y2="156"/>

    <!-- Single merge into dest -->
    <line x1="1170" y1="156" x2="1180" y2="156" marker-end="url(#arrow)"/>

    <!-- ===== [net] expansion ===== -->

    <!-- Boxes -->
    <rect x="160" y="460" width="90"  height="32" rx="4"/>            <!-- transient -->
    <rect x="270" y="460" width="40"  height="32" rx="4"/>            <!-- HP -->
    <rect x="330" y="460" width="40"  height="32" rx="4"/>            <!-- LP -->
    <rect x="390" y="460" width="70"  height="32" rx="4"/>            <!-- RAVE -->
    <rect x="520" y="424" width="120" height="32" rx="4"/>            <!-- post-RAVE dry -->
    <rect x="520" y="496" width="100" height="32" rx="4"/>            <!-- grainDelay -->
    <rect x="700" y="460" width="60"  height="32" rx="4"/>            <!-- on/off -->

    <!-- Wires -->
    <line x1="250" y1="476" x2="270" y2="476" marker-end="url(#arrow)"/>
    <line x1="310" y1="476" x2="330" y2="476" marker-end="url(#arrow)"/>
    <line x1="370" y1="476" x2="390" y2="476" marker-end="url(#arrow)"/>
    <line x1="460" y1="476" x2="490" y2="476" marker-end="url(#arrow)"/>
    <!-- post-RAVE tee -->
    <line x1="490" y1="440" x2="490" y2="512"/>
    <line x1="490" y1="440" x2="520" y2="440" marker-end="url(#arrow)"/>
    <line x1="490" y1="512" x2="520" y2="512" marker-end="url(#arrow)"/>
    <!-- merge -->
    <line x1="640" y1="440" x2="680" y2="440"/>
    <line x1="620" y1="512" x2="680" y2="512"/>
    <line x1="680" y1="440" x2="680" y2="512"/>
    <line x1="680" y1="476" x2="700" y2="476" marker-end="url(#arrow)"/>
    <line x1="760" y1="476" x2="800" y2="476" marker-end="url(#arrow)"/>
  </g>

  <!-- Tee dots -->
  <g fill="#fff">
    <circle cx="130"  cy="156" r="2.5"/>
    <circle cx="400"  cy="276" r="2.5"/>
    <circle cx="560"  cy="276" r="2.5"/>
    <circle cx="1170" cy="156" r="2.5"/>
    <circle cx="490"  cy="476" r="2.5"/>
    <circle cx="680"  cy="476" r="2.5"/>
  </g>

  <!-- Labels -->
  <g fill="#fff" text-anchor="middle" dominant-baseline="middle">
    <text x="59"   y="156">source</text>
    <text x="300"  y="76">dryDelay (latency match)</text>
    <text x="510"  y="76">masterDryGain</text>
    <text x="200"  y="276">toMono</text>
    <text x="320"  y="276">inputGain</text>
    <text x="480"  y="236">Funk [net]</text>
    <text x="485"  y="316">Djembe [net]</text>
    <text x="632"  y="276">fade</text>
    <text x="764"  y="276">comp(dry/wet)</text>
    <text x="919"  y="276">outputGain</text>
    <text x="1074" y="276">masterWetGain</text>
    <text x="1210" y="156">dest</text>

    <!-- [net] subgraph labels -->
    <text x="205" y="476">transient</text>
    <text x="290" y="476">HP</text>
    <text x="350" y="476">LP</text>
    <text x="425" y="476">RAVE</text>
    <text x="580" y="440">post-RAVE dry</text>
    <text x="570" y="512">grainDelay</text>
    <text x="730" y="476">on/off</text>
  </g>

  <!-- [net] = caption, baseline-aligned with the chain -->
  <text x="150" y="476" fill="#fff" font-style="italic" text-anchor="end" dominant-baseline="middle">[net] =</text>
</svg>
